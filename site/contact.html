<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Rangmandap</title>
  <meta name="description" content="Contact Rangmandap, Bajaj Nagar, Nagpur. Phone, email and office hours.">
  <link rel="icon" href="assets/images/events/gray-logo-removebg.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="contact">
  <div id="site-header"></div>

  <main>
    <section class="section">
      <div class="container section-head">
        <p class="eyebrow" data-i18n="contact.hero.eyebrow"></p>
        <h1 data-i18n="contact.hero.title"></h1>
        <p class="lead" data-i18n="contact.hero.lead"></p>
      </div>
    </section>

    <section class="section section--alt">
      <div class="container contact-grid">
        <div>
          <div class="info-block">
            <h3 data-i18n="contact.addr.label"></h3>
            <p data-i18n="contact.addr.body"></p>
          </div>
          <div class="info-block">
            <h3 data-i18n="contact.phone.label"></h3>
            <p><a href="tel:+918551838731">+91 85518 38731</a></p>
          </div>
          <div class="info-block">
            <h3 data-i18n="contact.email.label"></h3>
            <p><a href="mailto:payments@nirupak.org">payments@nirupak.org</a></p>
          </div>
          <div class="info-block">
            <h3 data-i18n="contact.hours.label"></h3>
            <p data-i18n="contact.hours.body"></p>
          </div>
        </div>
        <div>
          <div class="info-block">
            <h3 data-i18n="contact.person.label"></h3>
            <p><strong data-i18n="contact.person.name"></strong></p>
            <p data-i18n="contact.person.body"></p>
            <p><a href="tel:+918551838731">+91 85518 38731</a> · <a href="mailto:payments@nirupak.org">payments@nirupak.org</a></p>
            <p data-i18n="contact.person.hours"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="section cta-band">
      <div class="container">
        <div class="section-head center">
          <h2 data-i18n="contact.tickets.title"></h2>
          <p data-i18n="contact.tickets.body"></p>
        </div>
        <div class="hero-cta" style="justify-content:center">
          <a class="btn" href="https://rangmandap.com" target="_blank" rel="noopener" data-i18n="cta.tickets"></a>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
