<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experience — Rangmandap</title>
  <meta name="description" content="Explore Rangmandap: two stages, 325 seats, a bookshop, gallery, café and guest house.">
  <link rel="icon" href="assets/images/events/gray-logo-removebg.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="experience">
  <div id="site-header"></div>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-i18n="exp.hero.eyebrow"></p>
          <h1 data-i18n="exp.hero.title"></h1>
          <p class="lead" data-i18n="exp.hero.lead"></p>
        </div>
        <div class="stats">
          <div class="stat"><div class="num">2</div><div class="label" data-i18n="exp.stat.stages"></div></div>
          <div class="stat"><div class="num">325</div><div class="label" data-i18n="exp.stat.seats"></div></div>
          <div class="stat"><div class="num">6+</div><div class="label" data-i18n="exp.stat.spaces"></div></div>
        </div>
      </div>
    </section>

    <!-- Performance spaces -->
    <section class="section section--alt">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-i18n="exp.venues.eyebrow"></p>
          <h2 data-i18n="exp.venues.title"></h2>
        </div>
        <div class="grid cols-2">
          <div class="card">
            <img src="assets/images/events/theater.png" alt="The Proscenium Theatre" loading="lazy">
            <div class="card-body">
              <div class="meta" data-i18n="exp.prosc.meta"></div>
              <h3 data-i18n="exp.prosc.name"></h3>
              <p data-i18n="exp.prosc.body"></p>
            </div>
          </div>
          <div class="card">
            <img src="assets/images/events/box.png" alt="The Black Box" loading="lazy">
            <div class="card-body">
              <div class="meta" data-i18n="exp.box.meta"></div>
              <h3 data-i18n="exp.box.name"></h3>
              <p data-i18n="exp.box.body"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- More spaces -->
    <section class="section">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-i18n="exp.spaces.eyebrow"></p>
          <h2 data-i18n="exp.spaces.title"></h2>
        </div>
        <div class="grid cols-3">
          <div class="card">
            <img src="assets/images/events/bookshop.png" alt="The Bookshop" loading="lazy">
            <div class="card-body"><h3 data-i18n="exp.bookshop.name"></h3><p data-i18n="exp.bookshop.body"></p></div>
          </div>
          <div class="card">
            <img src="assets/images/events/bookshop.png" alt="Art Gallery" loading="lazy">
            <div class="card-body"><h3 data-i18n="exp.gallery.name"></h3><p data-i18n="exp.gallery.body"></p></div>
          </div>
          <div class="card">
            <img src="assets/images/events/cafe.jpeg" alt="The Café" loading="lazy">
            <div class="card-body"><h3 data-i18n="exp.cafe.name"></h3><p data-i18n="exp.cafe.body"></p></div>
          </div>
          <div class="card">
            <img src="assets/images/events/gust-house.jpeg" alt="Rangkuti Guest House" loading="lazy">
            <div class="card-body"><h3 data-i18n="exp.guest.name"></h3><p data-i18n="exp.guest.body"></p></div>
          </div>
          <div class="card">
            <img src="assets/images/events/parking.jpeg" alt="Parking" loading="lazy">
            <div class="card-body"><h3 data-i18n="exp.parking.name"></h3><p data-i18n="exp.parking.body"></p></div>
          </div>
        </div>
      </div>
    </section>

    <!-- House rules -->
    <section class="section section--alt">
      <div class="container split">
        <div>
          <p class="eyebrow" data-i18n="exp.rules.eyebrow"></p>
          <h2 data-i18n="exp.rules.title"></h2>
        </div>
        <ul class="rules">
          <li data-i18n="exp.rules.1"></li>
          <li data-i18n="exp.rules.2"></li>
          <li data-i18n="exp.rules.3"></li>
        </ul>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
