<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rangmandap — Theatre &amp; Performing Arts, Nagpur</title>
  <meta name="description" content="Rangmandap is a not-for-profit theatre and performing-arts space in Nagpur, managed by the Nirupak Foundation.">
  <link rel="icon" href="assets/images/events/gray-logo-removebg.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="home">
  <div id="site-header"></div>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-copy">
          <p class="eyebrow" data-i18n="home.hero.eyebrow"></p>
          <h1 data-i18n="home.hero.title"></h1>
          <p class="lead" data-i18n="home.hero.lead"></p>
          <div class="hero-cta">
            <a class="btn" href="https://rangamandap.com" target="_blank" rel="noopener" data-i18n="cta.tickets"></a>
            <a class="btn btn--ghost" href="experience.html" data-i18n="home.hero.cta2"></a>
          </div>
        </div>
        <div class="hero-media">
          <img src="assets/images/events/home-image-one.png" alt="Rangmandap theatre space" loading="eager">
        </div>
      </div>
    </section>

    <!-- Intro -->
    <section class="section section--alt">
      <div class="container split">
        <div class="split-media">
          <img src="assets/images/events/about-theater.png" alt="Inside the theatre" loading="lazy">
        </div>
        <div>
          <p class="eyebrow" data-i18n="home.intro.eyebrow"></p>
          <h2 data-i18n="home.intro.title"></h2>
          <p data-i18n="home.intro.body"></p>
          <a class="btn btn--ghost mt-2" href="about.html" data-i18n="nav.about"></a>
        </div>
      </div>
    </section>

    <!-- Coming Up -->
    <section class="section">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-i18n="home.coming.eyebrow"></p>
          <h2 data-i18n="home.coming.title"></h2>
          <p data-i18n="home.coming.body"></p>
        </div>
        <div class="carousel">
          <div class="carousel-track" id="comingTrack"></div>
        </div>
        <div class="mt-2">
          <a class="btn" href="https://rangamandap.com" target="_blank" rel="noopener" data-i18n="cta.tickets"></a>
        </div>
      </div>
    </section>

    <!-- Philosophy quote -->
    <section class="quote-band">
      <div class="container">
        <blockquote data-i18n="home.quote"></blockquote>
      </div>
    </section>

    <!-- CTA -->
    <section class="section section--alt cta-band">
      <div class="container">
        <div class="section-head center">
          <p class="eyebrow" data-i18n="contr.hero.eyebrow"></p>
          <h2 data-i18n="home.cta.title"></h2>
          <p data-i18n="home.cta.body"></p>
        </div>
        <div class="hero-cta" style="justify-content:center">
          <a class="btn" href="contribute.html" data-i18n="cta.contribute"></a>
          <a class="btn btn--ghost" href="contact.html" data-i18n="nav.contact"></a>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    // Build the Coming Up carousel from the available images
    (function () {
      const track = document.getElementById("comingTrack");
      if (!track) return;
      let html = "";
      for (let i = 1; i <= 12; i++) {
        html += `<div class="carousel-item"><img src="assets/images/coming-up/image-${i}.jpg" alt="Upcoming event ${i}" loading="lazy"></div>`;
      }
      track.innerHTML = html;
    })();
  </script>
</body>
</html>
