<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Rangmandap</title>
  <meta name="description" content="About Rangmandap, a not-for-profit theatre and performing-arts space in Nagpur run by the Nirupak Foundation.">
  <link rel="icon" href="assets/images/events/gray-logo-removebg.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="about">
  <div id="site-header"></div>

  <main>
    <section class="section">
      <div class="container section-head">
        <p class="eyebrow" data-i18n="about.hero.eyebrow"></p>
        <h1 data-i18n="about.hero.title"></h1>
        <p class="lead" data-i18n="about.hero.lead"></p>
      </div>
    </section>

    <!-- About the theatre -->
    <section class="section section--alt">
      <div class="container split">
        <div class="split-media">
          <img src="assets/images/events/about-theater.png" alt="The theatre" loading="lazy">
        </div>
        <div>
          <p class="eyebrow" data-i18n="about.theatre.eyebrow"></p>
          <h2 data-i18n="about.theatre.title"></h2>
          <p data-i18n="about.theatre.body"></p>
        </div>
      </div>
    </section>

    <!-- Purpose + pillars -->
    <section class="section">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-i18n="about.purpose.eyebrow"></p>
          <h2 data-i18n="about.purpose.title"></h2>
          <p data-i18n="about.purpose.body"></p>
        </div>
        <div class="grid cols-2">
          <div class="card"><div class="card-body"><h3 data-i18n="about.p1.name"></h3><p data-i18n="about.p1.body"></p></div></div>
          <div class="card"><div class="card-body"><h3 data-i18n="about.p2.name"></h3><p data-i18n="about.p2.body"></p></div></div>
          <div class="card"><div class="card-body"><h3 data-i18n="about.p3.name"></h3><p data-i18n="about.p3.body"></p></div></div>
          <div class="card"><div class="card-body"><h3 data-i18n="about.p4.name"></h3><p data-i18n="about.p4.body"></p></div></div>
        </div>
      </div>
    </section>

    <!-- Philosophy -->
    <section class="section section--alt">
      <div class="container split reverse">
        <div class="split-media">
          <img src="assets/images/events/philosophy.png" alt="Our philosophy" loading="lazy">
        </div>
        <div>
          <p class="eyebrow" data-i18n="about.phil.eyebrow"></p>
          <h2 data-i18n="about.phil.title"></h2>
          <blockquote style="font-family:var(--font-display);font-size:1.6rem;line-height:1.35;color:var(--maroon);border-left:3px solid var(--gold);margin:0;padding-left:1.2rem" data-i18n="about.phil.quote"></blockquote>
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section class="section cta-band">
      <div class="container">
        <div class="section-head center">
          <h2 data-i18n="about.cta.title"></h2>
        </div>
        <div class="hero-cta" style="justify-content:center">
          <a class="btn" href="contribute.html" data-i18n="cta.contribute"></a>
          <a class="btn btn--ghost" href="https://rangmandap.com" target="_blank" rel="noopener" data-i18n="cta.tickets"></a>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
