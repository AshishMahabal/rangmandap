<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contribute — Rangmandap</title>
  <meta name="description" content="Support the restoration of Rangmandap with funds, materials or expertise.">
  <link rel="icon" href="assets/images/events/gray-logo-removebg.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="contribute">
  <div id="site-header"></div>

  <main>
    <section class="section">
      <div class="container split">
        <div>
          <p class="eyebrow" data-i18n="contr.hero.eyebrow"></p>
          <h1 data-i18n="contr.hero.title"></h1>
          <p class="lead" data-i18n="contr.hero.lead"></p>
          <p data-i18n="contr.intro.body"></p>
        </div>
        <div class="progress-wrap">
          <p class="eyebrow" data-i18n="contr.prog.eyebrow"></p>
          <h3 data-i18n="contr.prog.title"></h3>
          <div class="progress-bar"><span style="width:25%"></span></div>
          <div class="figures">
            <div class="figure"><div class="amt" data-i18n="contr.prog.total.amt"></div><div class="cap" data-i18n="contr.prog.total.cap"></div></div>
            <div class="figure"><div class="amt" data-i18n="contr.prog.spent.amt"></div><div class="cap" data-i18n="contr.prog.spent.cap"></div></div>
            <div class="figure"><div class="amt" data-i18n="contr.prog.need.amt"></div><div class="cap" data-i18n="contr.prog.need.cap"></div></div>
          </div>
          <p style="font-size:.85rem;margin-top:1rem;margin-bottom:0" data-i18n="contr.prog.note"></p>
        </div>
      </div>
    </section>

    <!-- Three ways -->
    <section class="section section--alt">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-i18n="contr.ways.eyebrow"></p>
          <h2 data-i18n="contr.ways.title"></h2>
        </div>
        <div class="grid cols-3 ways">
          <div class="way"><div class="n">1</div><div><h3 data-i18n="contr.way1.name"></h3><p data-i18n="contr.way1.body"></p></div></div>
          <div class="way"><div class="n">2</div><div><h3 data-i18n="contr.way2.name"></h3><p data-i18n="contr.way2.body"></p></div></div>
          <div class="way"><div class="n">3</div><div><h3 data-i18n="contr.way3.name"></h3><p data-i18n="contr.way3.body"></p></div></div>
        </div>
      </div>
    </section>

    <!-- Floor plans -->
    <section class="section">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-i18n="contr.plans.eyebrow"></p>
          <h2 data-i18n="contr.plans.title"></h2>
        </div>
        <div class="plans">
          <figure><img src="assets/images/events/Rangmandap_gf.png" alt="Ground floor plan" loading="lazy"><figcaption data-i18n="contr.plans.gf"></figcaption></figure>
          <figure><img src="assets/images/events/Rangmandap_ff.png" alt="First floor plan" loading="lazy"><figcaption data-i18n="contr.plans.ff"></figcaption></figure>
          <figure><img src="assets/images/events/Rangmandap_sf.png" alt="Second floor plan" loading="lazy"><figcaption data-i18n="contr.plans.sf"></figcaption></figure>
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section class="section section--alt cta-band">
      <div class="container">
        <div class="section-head center">
          <h2 data-i18n="contr.cta.title"></h2>
          <p data-i18n="contr.cta.body"></p>
        </div>
        <div class="hero-cta" style="justify-content:center">
          <a class="btn" href="mailto:payments@nirupak.org">payments@nirupak.org</a>
          <a class="btn btn--ghost" href="tel:+918551838731">+91 85518 38731</a>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
